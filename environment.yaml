name: physllm
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch
  - torchvision
  - numpy
  - scipy
  - pandas
  - matplotlib
  - scikit-learn
  - opencv
  - pillow
  - pyyaml
  - pip:
      - yacs>=0.1.8
      - tqdm>=4.66
      - transformers>=4.40
      - peft>=0.10
      - accelerate>=0.29
      - reformer-pytorch>=1.4
      - pytorch-wavelets>=1.3
      - fastdtw>=0.3.4
      - retina-face>=0.0.17
      - tensorboard>=2.14
      - git+https://github.com/openai/CLIP.git
